name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - PA-4/OlesonChristian_Assignment4
          - PA-5.1/OlesonChristian_Rectangle
          - PA-5.2/OlesonChristian_5_1
          - MidtermProject/OlesonChristian_MidtermProject
          - FinalProject/FinalAssignment

    name: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ matrix.project }}/gradlew

      - name: Build
        working-directory: ${{ matrix.project }}
        run: ./gradlew build -x test

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ strategy.job-index }}
          path: ${{ matrix.project }}/build/reports/tests/
          retention-days: 7
